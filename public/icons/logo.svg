<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="light" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 장식 원 -->
  <circle cx="400" cy="100" r="120" fill="white" opacity="0.06"/>
  <circle cx="100" cy="420" r="80" fill="white" opacity="0.04"/>

  <!-- 빛줄기 -->
  <g opacity="0.15" transform="translate(256, 180)">
    <polygon points="0,-60 -8,60 8,60" fill="white"/>
    <polygon points="0,-60 -8,60 8,60" fill="white" transform="rotate(30)"/>
    <polygon points="0,-60 -8,60 8,60" fill="white" transform="rotate(-30)"/>
    <polygon points="0,-60 -8,60 8,60" fill="white" transform="rotate(60)"/>
    <polygon points="0,-60 -8,60 8,60" fill="white" transform="rotate(-60)"/>
    <polygon points="0,-60 -8,60 8,60" fill="white" transform="rotate(15)"/>
    <polygon points="0,-60 -8,60 8,60" fill="white" transform="rotate(-15)"/>
    <polygon points="0,-60 -8,60 8,60" fill="white" transform="rotate(45)"/>
    <polygon points="0,-60 -8,60 8,60" fill="white" transform="rotate(-45)"/>
  </g>

  <!-- 펼쳐진 성경책 -->
  <g transform="translate(256, 290)">
    <!-- 왼쪽 페이지 -->
    <path d="M-10,0 L-10,-80 Q-10,-95 -25,-95 L-110,-95 Q-120,-95 -120,-85 L-120,40 Q-120,50 -110,50 L-10,50 Z" fill="white" opacity="0.95"/>
    <!-- 오른쪽 페이지 -->
    <path d="M10,0 L10,-80 Q10,-95 25,-95 L110,-95 Q120,-95 120,-85 L120,40 Q120,50 110,50 L10,50 Z" fill="white" opacity="0.9"/>
    <!-- 책등 -->
    <path d="M-10,-95 Q0,-105 10,-95 L10,50 Q0,55 -10,50 Z" fill="url(#gold)"/>

    <!-- 왼쪽 글줄 -->
    <g opacity="0.2" stroke="none">
      <rect x="-100" y="-75" width="70" height="3" rx="1.5" fill="#0D9488"/>
      <rect x="-100" y="-62" width="60" height="3" rx="1.5" fill="#0D9488"/>
      <rect x="-100" y="-49" width="75" height="3" rx="1.5" fill="#0D9488"/>
      <rect x="-100" y="-36" width="55" height="3" rx="1.5" fill="#0D9488"/>
      <rect x="-100" y="-23" width="65" height="3" rx="1.5" fill="#0D9488"/>
      <rect x="-100" y="-10" width="70" height="3" rx="1.5" fill="#0D9488"/>
      <rect x="-100" y="3" width="50" height="3" rx="1.5" fill="#0D9488"/>
      <rect x="-100" y="16" width="72" height="3" rx="1.5" fill="#0D9488"/>
      <rect x="-100" y="29" width="58" height="3" rx="1.5" fill="#0D9488"/>
    </g>
    <!-- 오른쪽 글줄 -->
    <g opacity="0.2" stroke="none">
      <rect x="30" y="-75" width="70" height="3" rx="1.5" fill="#0D9488"/>
      <rect x="30" y="-62" width="55" height="3" rx="1.5" fill="#0D9488"/>
      <rect x="30" y="-49" width="75" height="3" rx="1.5" fill="#0D9488"/>
      <rect x="30" y="-36" width="60" height="3" rx="1.5" fill="#0D9488"/>
      <rect x="30" y="-23" width="68" height="3" rx="1.5" fill="#0D9488"/>
      <rect x="30" y="-10" width="50" height="3" rx="1.5" fill="#0D9488"/>
      <rect x="30" y="3" width="72" height="3" rx="1.5" fill="#0D9488"/>
      <rect x="30" y="16" width="62" height="3" rx="1.5" fill="#0D9488"/>
      <rect x="30" y="29" width="55" height="3" rx="1.5" fill="#0D9488"/>
    </g>
  </g>

  <!-- 십자가 (작은) -->
  <g transform="translate(256, 165)">
    <rect x="-4" y="-35" width="8" height="50" rx="3" fill="url(#gold)"/>
    <rect x="-16" y="-22" width="32" height="8" rx="3" fill="url(#gold)"/>
  </g>

  <!-- 빛 글로우 -->
  <circle cx="256" cy="165" r="25" fill="white" opacity="0.2"/>
  <circle cx="256" cy="165" r="15" fill="white" opacity="0.15"/>

  <!-- 비둘기 (심플) -->
  <g transform="translate(330, 155) scale(0.6)" fill="white" opacity="0.9">
    <path d="M0,0 Q-15,-20 -5,-35 Q5,-30 10,-35 Q15,-20 5,-10 Q20,-15 35,-10 Q20,-5 10,0 Z"/>
  </g>
</svg>
