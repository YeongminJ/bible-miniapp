<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="60%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cross" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
  </defs>

  <!-- 배경 (꽉 찬 사각형) -->
  <rect width="600" height="600" fill="url(#bg)"/>

  <!-- 원형 후광 (안전영역 내) -->
  <circle cx="300" cy="300" r="210" fill="url(#glow)"/>

  <!--
    안전 영역: 600x600 캔버스에서 380x380 정사각(63%) 중앙 배치.
    즉 x: 110~490, y: 110~490 안에 모든 주요 요소 배치.
    십자가 세로: x=280, y=140, w=40, h=320 → y 140~460, x 280~320
    십자가 가로: x=180, y=280, w=240, h=40 → x 180~420, y 280~320
    모두 안전 영역 안에 있고, 반지름 190 원 안에도 들어감.
  -->
  <g fill="url(#cross)">
    <rect x="280" y="140" width="40" height="320" rx="10"/>
    <rect x="180" y="280" width="240" height="40" rx="10"/>
  </g>

  <!-- 작은 스파클 악센트 (안전 영역 내, 상단 좌우) -->
  <g fill="#FEF3C7" opacity="0.9">
    <g transform="translate(180 180)">
      <path d="M0,-10 L2,-2 L10,0 L2,2 L0,10 L-2,2 L-10,0 L-2,-2 Z"/>
    </g>
    <g transform="translate(420 200)" opacity="0.75">
      <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z"/>
    </g>
    <g transform="translate(405 420)" opacity="0.6">
      <path d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5 Z"/>
    </g>
  </g>
</svg>
